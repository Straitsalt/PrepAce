<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrepAce Login</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>📚 PrepAce</h1>
        <p>NEET/JEE Smart Portal</p>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p class="guest">
            Demo Login:<br>
            Username: <b>student</b><br>
            Password: <b>1234</b>
        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
